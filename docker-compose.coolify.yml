# Coolify production stack.
# In Coolify, assign a public domain to:
# - frontend on container port 80
# - backend on container port 8000
services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dbku_attendance}
      POSTGRES_USER: ${POSTGRES_USER:-dbku_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:?}
      DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:?}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?}
      DB_NAME: ${POSTGRES_DB:-dbku_attendance}
      DB_USER: ${POSTGRES_USER:-dbku_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?}
      DB_HOST: postgres
      DB_PORT: "5432"
      FRONTEND_URL: ${FRONTEND_URL:?}
      BASE_APP_URL: ${FRONTEND_URL:?}
      SERVE_MEDIA_FILES: "True"
      NOTIFICATION_EMAIL_ENABLED: ${NOTIFICATION_EMAIL_ENABLED:-False}
      NOTIFICATION_EMAIL_PROVIDER: ${NOTIFICATION_EMAIL_PROVIDER:-brevo}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_FROM_EMAIL: ${BREVO_FROM_EMAIL:-}
      BREVO_FROM_NAME: ${BREVO_FROM_NAME:-DBKU Attendance}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@dbku.gov.my}
      NOTIFICATION_ADMIN_EMAILS: ${NOTIFICATION_ADMIN_EMAILS:-}
      NOTIFICATION_EMAIL_REDIRECT_TO: ${NOTIFICATION_EMAIL_REDIRECT_TO:-}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-False}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_TIMEOUT: ${EMAIL_TIMEOUT:-15}
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-False}
      WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-evolution}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
      EVOLUTION_INSTANCE_NAME: ${EVOLUTION_INSTANCE_NAME:-}
      EVOLUTION_API_TIMEOUT: ${EVOLUTION_API_TIMEOUT:-15}
      NOTIFICATION_ADMIN_WHATSAPP_NUMBERS: ${NOTIFICATION_ADMIN_WHATSAPP_NUMBERS:-}
      JWT_ACCESS_MINUTES: ${JWT_ACCESS_MINUTES:-60}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-7}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_FULL_NAME: ${SEED_ADMIN_FULL_NAME:-System Admin}
      SEED_ADMIN_STAFF_ID: ${SEED_ADMIN_STAFF_ID:-ADMIN001}
      SEED_ADMIN_DEPARTMENT: ${SEED_ADMIN_DEPARTMENT:-Administration (ADM)}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    volumes:
      - backend_media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?}
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

volumes:
  postgres_data:
  backend_media:
